<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ระบบจัดการร้าน (Admin)</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- LIFF SDK -->
    <script charset="utf-8" src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <!-- SweetAlert2 -->
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;600&display=swap');
        body { font-family: 'Kanit', sans-serif; background-color: #f3f4f6; }
        .hidden-section { display: none; }
        .filter-btn.active { background-color: #1f2937; color: white; border-color: #1f2937; }
    </style>
</head>
<body class="text-gray-800 pb-20">

    <!-- Navbar -->
    <div class="bg-gray-900 text-white shadow-md sticky top-0 z-50">
        <div class="max-w-4xl mx-auto px-4 py-4 flex items-center justify-between">
            <h1 class="text-lg font-bold flex items-center gap-2">
                <i class="fa-solid fa-scissors text-orange-500"></i> Barber Admin
            </h1>
            <button id="btn-logout" onclick="logoutAdmin()" class="hidden text-sm text-gray-300 hover:text-white bg-gray-800 px-3 py-1 rounded">
                ออกจากระบบ
            </button>
        </div>
    </div>

    <!-- Login Section -->
    <div id="login-section" class="max-w-sm mx-auto mt-20 p-6 bg-white rounded-2xl shadow-lg mx-4">
        <div class="text-center mb-6">
            <div class="w-20 h-20 bg-green-500 rounded-full flex items-center justify-center mx-auto mb-4 shadow-green-200 shadow-lg">
                <i class="fa-brands fa-line text-4xl text-white"></i>
            </div>
            <h2 class="text-2xl font-bold text-gray-800">เจ้าของร้าน</h2>
            <p class="text-gray-500 text-sm mt-1">ยืนยันตัวตนผ่าน LINE เพื่อเข้าจัดการ</p>
        </div>
        
        <div id="admin-profile" class="hidden text-center mb-6">
             <img id="admin-img" src="" class="w-16 h-16 rounded-full mx-auto border-2 border-green-500 mb-2 object-cover">
             <p id="admin-name" class="font-bold text-lg"></p>
        </div>

        <button onclick="loginWithLine()" id="btn-login" class="w-full bg-[#06C755] hover:bg-[#05b34c] text-white py-3 rounded-xl font-bold transition flex items-center justify-center gap-2 shadow-md">
            <i class="fa-solid fa-right-to-bracket"></i> ยืนยันตัวตนและเข้าสู่ระบบ
        </button>
        <p id="login-status" class="text-center text-red-500 text-sm mt-3 hidden"></p>
    </div>

    <!-- Dashboard Section -->
    <div id="dashboard-section" class="hidden-section max-w-4xl mx-auto mt-6 px-4">
        
        <div class="flex flex-col sm:flex-row justify-between items-start sm:items-end gap-4 mb-6">
            <div>
                <h2 class="text-xl font-bold text-gray-800">จัดการคิววันนี้</h2>
                <p class="text-sm text-gray-500">เลือกดูรายการตามชื่อช่าง</p>
            </div>
            <button onclick="fetchBookings()" class="bg-white border text-gray-600 px-3 py-2 rounded-lg shadow-sm hover:bg-gray-50 text-sm flex items-center gap-2">
                <i class="fa-solid fa-rotate-right"></i> รีเฟรช
            </button>
        </div>

        <!-- Filter Tabs (ปรับให้ตรงกับช่างล่าสุดของคุณ) -->
        <div class="flex gap-2 mb-6 overflow-x-auto pb-2">
            <button onclick="setFilter('all')" id="filter-all" class="filter-btn active bg-white border border-gray-300 text-gray-700 px-4 py-2 rounded-full text-sm font-medium whitespace-nowrap transition-colors">
                ทั้งหมด
            </button>
            <button onclick="setFilter('ช่างเอก')" id="filter-1" class="filter-btn bg-white border border-gray-300 text-gray-700 px-4 py-2 rounded-full text-sm font-medium whitespace-nowrap transition-colors flex items-center gap-2">
                <div class="w-2 h-2 rounded-full bg-blue-500"></div> ช่างเอก
            </button>
            <button onclick="setFilter('ช่างบอย')" id="filter-2" class="filter-btn bg-white border border-gray-300 text-gray-700 px-4 py-2 rounded-full text-sm font-medium whitespace-nowrap transition-colors flex items-center gap-2">
                <div class="w-2 h-2 rounded-full bg-orange-500"></div> ช่างบอย
            </button>
            <button onclick="setFilter('ช่างโจ')" id="filter-3" class="filter-btn bg-white border border-gray-300 text-gray-700 px-4 py-2 rounded-full text-sm font-medium whitespace-nowrap transition-colors flex items-center gap-2">
                <div class="w-2 h-2 rounded-full bg-green-500"></div> ช่างโจ
            </button>
        </div>

        <!-- Content -->
        <div id="bookings-container" class="space-y-4">
            <!-- Data will be injected here -->
        </div>
    </div>

    <script>
        // ==========================================
        // 🔴 ตั้งค่า 2 จุดนี้ให้ถูกต้องก่อนใช้งาน 🔴
        // ==========================================
        const LIFF_ID = "2009061981-DcElzckB"; // เปลี่ยนเป็น LIFF ID ของคุณ
        const APPS_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzyjFT_fJiirTSEs8aymoX-RnlVSEBjvf3rNE1VFDPhYEtuE3F_U6-5xpn-Y8Bb5g_d/exec"; // เปลี่ยนเป็น URL ของ Google Script ของคุณ

        let allBookingsData = [];
        let currentFilter = 'all';
        let isLiffInitialized = false;

        document.addEventListener('DOMContentLoaded', async () => {
            try {
                if(LIFF_ID === "YOUR_LIFF_ID") {
                     document.getElementById('login-status').textContent = "กรุณาใส่ LIFF ID ก่อนใช้งาน";
                     document.getElementById('login-status').classList.remove('hidden');
                     return;
                }

                await liff.init({ liffId: LIFF_ID });
                isLiffInitialized = true;
                
                if (liff.isLoggedIn()) {
                    const profile = await liff.getProfile();
                    document.getElementById('admin-img').src = profile.pictureUrl;
                    document.getElementById('admin-name').textContent = profile.displayName;
                    document.getElementById('admin-profile').classList.remove('hidden');
                    document.getElementById('btn-login').innerHTML = '<i class="fa-solid fa-check"></i> ตรวจสอบสิทธิ์เข้าใช้งาน';
                    
                    // หากเคย Login ผ่านแล้ว ให้ข้ามไปหน้า Dashboard ได้เลย
                    if (sessionStorage.getItem('adminLoggedIn') === 'true') {
                        showDashboard();
                    }
                }
            } catch (err) {
                console.error("LIFF Init Error", err);
                document.getElementById('login-status').textContent = "ระบบ LINE LIFF มีปัญหา";
                document.getElementById('login-status').classList.remove('hidden');
            }
        });

        async function loginWithLine() {
            if (!isLiffInitialized) return;

            if (!liff.isLoggedIn()) {
                liff.login();
                return;
            }

            const btn = document.getElementById('btn-login');
            const status = document.getElementById('login-status');
            
            btn.disabled = true;
            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> กำลังตรวจสอบสิทธิ์...';
            status.classList.add('hidden');

            try {
                // ดึง ID Token ที่ได้จากการล็อกอินด้วย LINE
                const idToken = liff.getIDToken(); 
                
                // ส่ง Token ไปตรวจสอบกับ Google Apps Script (Backend)
                const res = await fetch(`${APPS_SCRIPT_URL}?action=admin_check_auth&idToken=${idToken}`);
                const data = await res.json();

                if (data.status === 'success') {
                    sessionStorage.setItem('adminLoggedIn', 'true');
                    showDashboard();
                } else {
                    btn.disabled = false;
                    btn.innerHTML = '<i class="fa-solid fa-xmark"></i> เข้าสู่ระบบไม่สำเร็จ';
                    btn.classList.add('bg-red-500', 'hover:bg-red-600');
                    status.textContent = data.message || "คุณไม่มีสิทธิ์เข้าถึงหน้านี้";
                    status.classList.remove('hidden');
                }
            } catch (err) {
                console.error(err);
                btn.disabled = false;
                btn.innerHTML = 'ลองใหม่';
                status.textContent = "เกิดข้อผิดพลาดในการเชื่อมต่อกับเซิร์ฟเวอร์";
                status.classList.remove('hidden');
            }
        }

        function logoutAdmin() {
            sessionStorage.removeItem('adminLoggedIn');
            location.reload();
        }

        function showDashboard() {
            document.getElementById('login-section').style.display = 'none';
            document.getElementById('dashboard-section').style.display = 'block';
            document.getElementById('btn-logout').classList.remove('hidden');
            fetchBookings();
        }

        function setFilter(filter) {
            currentFilter = filter;
            
            // Update UI Buttons
            document.querySelectorAll('.filter-btn').forEach(btn => btn.classList.remove('active'));
            if(filter === 'all') document.getElementById('filter-all').classList.add('active');
            else if(filter === 'ช่างเอก') document.getElementById('filter-1').classList.add('active');
            else if(filter === 'ช่างบอย') document.getElementById('filter-2').classList.add('active');
            else if(filter === 'ช่างโจ') document.getElementById('filter-3').classList.add('active');

            renderBookings();
        }

        async function fetchBookings() {
            const container = document.getElementById('bookings-container');
            container.innerHTML = `<div class="text-center py-10"><i class="fas fa-spinner fa-spin text-3xl text-blue-500 mb-3"></i><p class="text-gray-500">กำลังโหลดคิวจอง...</p></div>`;

            try {
                const res = await fetch(`${APPS_SCRIPT_URL}?action=admin_get_bookings`);
                const data = await res.json();
                if (data.status === 'success') {
                    allBookingsData = data.data;
                    renderBookings();
                } else {
                    container.innerHTML = `<div class="text-center text-red-500 py-10">Error: ${data.message}</div>`;
                }
            } catch (err) {
                container.innerHTML = `<div class="text-center text-red-500 py-10">โหลดข้อมูลล้มเหลว กรุณาลองใหม่</div>`;
            }
        }

        function renderBookings() {
            const container = document.getElementById('bookings-container');
            
            let filtered = allBookingsData;
            if (currentFilter !== 'all') {
                filtered = allBookingsData.filter(item => item.barber === currentFilter);
            }

            if (!filtered || filtered.length === 0) {
                container.innerHTML = `<div class="bg-white p-10 rounded-xl text-center border shadow-sm"><div class="w-16 h-16 bg-gray-50 rounded-full flex items-center justify-center mx-auto mb-3"><i class="fa-regular fa-folder-open text-2xl text-gray-400"></i></div><p class="text-gray-500">ไม่พบรายการคิวในขณะนี้</p></div>`;
                return;
            }

            container.innerHTML = filtered.map(item => `
                <div class="bg-white p-5 rounded-2xl border border-gray-200 shadow-sm hover:shadow-md transition">
                    <div class="flex flex-col md:flex-row gap-4 justify-between">
                        
                        <!-- ข้อมูล -->
                        <div class="flex-1">
                            <div class="flex items-center gap-3 mb-3">
                                <span class="bg-gray-900 text-white text-xl px-4 py-1.5 rounded-lg font-bold shadow-sm">${item.time} น.</span>
                                <div>
                                    <p class="font-bold text-gray-800 text-lg leading-tight">${formatDateThai(item.date)}</p>
                                    <p class="text-xs text-gray-400">วันนัดหมาย</p>
                                </div>
                            </div>
                            
                            <div class="grid grid-cols-1 md:grid-cols-2 gap-x-6 gap-y-2 text-sm text-gray-600">
                                <p class="flex items-center gap-2">
                                    <i class="fa-regular fa-user text-gray-400 w-5"></i> 
                                    <span class="font-medium text-gray-900 text-lg">${item.name}</span>
                                </p>
                                <p class="flex items-center gap-2">
                                    <i class="fa-solid fa-phone text-gray-400 w-5"></i> 
                                    <a href="tel:${item.phone}" class="text-blue-600 hover:underline font-medium">${item.phone}</a>
                                </p>
                                <p class="flex items-center gap-2">
                                    <i class="fa-solid fa-scissors text-orange-400 w-5"></i> 
                                    <span>ช่าง: <span class="font-bold text-blue-600">${item.barber}</span></span>
                                </p>
                                <div class="col-span-1 md:col-span-2 mt-2 bg-blue-50 p-3 rounded-lg border border-blue-100">
                                    <p class="flex items-start gap-2 text-blue-800">
                                        <i class="fa-solid fa-list-check w-5 mt-0.5"></i> 
                                        <span>${item.services || 'ไม่ระบุ'}</span>
                                    </p>
                                </div>
                            </div>
                        </div>
                        
                        <!-- ปุ่ม Action -->
                        <div class="flex flex-row md:flex-col gap-2 justify-end border-t md:border-t-0 md:border-l border-gray-100 pt-4 md:pt-0 md:pl-4">
                            <button onclick="updateStatus('${item.groupId || item.row}', 'complete', '${item.name}', '${item.time}')" 
                                class="flex-1 md:w-32 bg-green-600 hover:bg-green-700 text-white px-4 py-3 rounded-xl text-sm font-bold shadow-sm transition-all flex items-center justify-center gap-2">
                                <i class="fa-solid fa-check-circle"></i> เสร็จสิ้น
                            </button>
                            
                            <button onclick="updateStatus('${item.groupId || item.row}', 'cancel', '${item.name}', '${item.time}')" 
                                class="flex-1 md:w-32 bg-white hover:bg-red-50 text-red-500 hover:text-red-700 border border-red-200 px-4 py-3 rounded-xl text-sm font-medium transition-all flex items-center justify-center gap-2">
                                <i class="fa-solid fa-ban"></i> ยกเลิก
                            </button>
                        </div>

                    </div>
                </div>
            `).join('');
        }

        async function updateStatus(groupId, actionType, customerName, time) {
            const isComplete = (actionType === 'complete');
            const titleText = isComplete ? 'จบงานและรับชำระเงิน?' : 'ยืนยันยกเลิกคิว?';
            const bodyText = isComplete 
                ? `ลูกค้ารายการ "${customerName}" เวลา ${time} น. รับบริการเสร็จสิ้นแล้วใช่หรือไม่?`
                : `ต้องการยกเลิกคิวของ "${customerName}" เวลา ${time} น. ใช่หรือไม่?`;
            const confirmColor = isComplete ? '#16a34a' : '#ef4444';
            const btnText = isComplete ? 'ใช่, เสร็จสิ้น' : 'ใช่, ยกเลิกคิว';

            const result = await Swal.fire({
                title: titleText,
                text: bodyText,
                icon: isComplete ? 'success' : 'warning',
                showCancelButton: true,
                confirmButtonColor: confirmColor,
                confirmButtonText: btnText,
                cancelButtonText: 'ปิด'
            });

            if (result.isConfirmed) {
                Swal.fire({ title: 'กำลังบันทึกข้อมูล...', allowOutsideClick: false, didOpen: () => Swal.showLoading() });
                try {
                    const payload = { 
                        action: isComplete ? "admin_complete" : "admin_cancel" 
                    };
                    
                    if (isNaN(groupId)) payload.groupId = groupId; 
                    else payload.row = groupId; 

                    const res = await fetch(APPS_SCRIPT_URL, {
                        method: 'POST',
                        body: JSON.stringify(payload)
                    });
                    const data = await res.json();
                    
                    if (data.status === 'success') {
                        Swal.fire('เรียบร้อย!', isComplete ? 'อัปเดตงานเสร็จสิ้นแล้ว' : 'ยกเลิกคิวสำเร็จ', 'success');
                        fetchBookings(); 
                    } else {
                        Swal.fire('ผิดพลาด', data.message, 'error');
                    }
                } catch (err) { Swal.fire('Error', 'การเชื่อมต่อขัดข้อง', 'error'); }
            }
        }

        function formatDateThai(dateStr) {
            try {
                const options = { year: 'numeric', month: 'short', day: 'numeric', weekday: 'short' };
                return new Date(dateStr).toLocaleDateString('th-TH', options);
            } catch(e) { return dateStr; }
        }
    </script>
</body>
</html>
